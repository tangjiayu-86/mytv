	#stream-link反代配置
	resolver 1.1.1.1 ipv6=off valid=30s;

	server {
    	listen 30001;
    	listen [::]:30001;
    	server_name cdn5.163189.xyz;

    	# ================== 基础优化 ==================
    	proxy_ssl_server_name on;
    	proxy_ssl_verify off;
    	proxy_http_version 1.1;
    	proxy_buffering off;
    	proxy_request_buffering off;
    	chunked_transfer_encoding on;

    	proxy_set_header User-Agent "TiviMate/5.1.0";
    	proxy_set_header Accept "*/*";
    	proxy_set_header Connection "keep-alive";

    	# ================== m3u订阅文件 ==================
    	location ~ \.m3u$ {

        	proxy_pass https://www.stream-link.org;

        	proxy_set_header Host www.stream-link.org;
        	proxy_set_header User-Agent "TiviMate/5.1.0";

        	sub_filter_once off;
        	sub_filter_types *;

        	sub_filter 'https://' 'http://$host:30001/p/https://';

        	gzip off;

        	proxy_set_header Accept-Encoding "";
    	}
	
    	# ================== 核心 /p/ 动态反代 ==================
    	location ^~ /p/ {

        	resolver 1.1.1.1 ipv6=off;

        	set $target $request_uri;

        	if ($target ~ "^/p/(https?://[^/]+)(/.*)$") {

            	set $upstream_host $1;
            	set $upstream_path $2;

        	}

        	if ($upstream_host = "") {
            	return 404;
        	}

        	proxy_pass $upstream_host$upstream_path;

        	proxy_set_header Host $proxy_host;
        	proxy_set_header User-Agent "TiviMate/5.1.0";

        	proxy_ssl_server_name on;

        	proxy_set_header Referer https://www.stream-link.org/;

        	gzip off;

        	proxy_set_header Accept-Encoding "";

        	sub_filter_once off;
			sub_filter_types application/vnd.apple.mpegurl text/plain;

        	sub_filter '/2600_' 'http://$host:30001/p/$upstream_host/2600_';
			sub_filter '/hls_' 'http://$host:30001/p/$upstream_host/hls_';
        	sub_filter 'https://' 'http://$host:30001/p/https://';

        	proxy_intercept_errors on;

        	error_page 301 302 307 = @redirect;
    	}

    	# ================== 内部跳转处理 ==================
    	location @redirect {

        	set $redirect_url $upstream_http_location;

        	if ($redirect_url ~ "^/") {

            	set $redirect_url https://$proxy_host$redirect_url;

        	}

        	set $redirect_url /p/$redirect_url;

        	return 302 $redirect_url;
    	}

    	# ================== 默认拒绝其他请求 ==================
    	location / {
        	return 404;
    	}
	}


	server {
		listen 30000;
		listen [::]:30000;
		server_name cdn5.163189.xyz; # 替换为您的域名

		# 自定义响应头：缓存命中状态和剩余缓存时间
		add_header X-Cache-Status $upstream_cache_status;
		add_header X-Cache-TTL $upstream_http_x_cache_ttl;

		proxy_set_header Host cdn.qd.je;

		# 默认 location 配置
		location /mytv.m3u {
			proxy_pass http://cdn.qd.je/mytv.m3u;  # 替换为您的源站地址
			sub_filter '服务器ip' '$host';
			sub_filter_once off;  # 替换所有匹配项
			sub_filter_types *;  # 对所有 MIME 类型进行替换

			# 解压 gzip 压缩内容（如源站启用了压缩）
			gzip off;
			proxy_set_header Accept-Encoding "";
		}
